name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: List available simulators
        run: xcrun simctl list devices available | grep -E "iPhone|iPad" | head -10

      - name: Build iOS App (Simulator)
        run: |
          xcodebuild -project PoushiTongdao.xcodeproj \
            -scheme PoushiTongdao \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ./DerivedData \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PoushiTongdao-build
          path: ./DerivedData/Build/Products/Release-iphonesimulator/
          retention-days: 7
