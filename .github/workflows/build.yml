name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Regenerate Xcode project
        run: python3 generate_xcodeproj.py

      - name: List available simulators
        run: xcrun simctl list devices available | grep -E "iPhone|iPad" | head -10

      - name: Build iOS App (Debug Simulator)
        run: |
          xcodebuild -project PoushiTongdao.xcodeproj \
            -scheme PoushiTongdao \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            SWIFT_VERSION=5.0 \
            build

      - name: Build iOS App (Release Device)
        run: |
          xcodebuild -project PoushiTongdao.xcodeproj \
            -scheme PoushiTongdao \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./DerivedData \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            SWIFT_VERSION=5.0 \
            build

      - name: Create .app package
        run: |
          mkdir -p ./App
          cp -R ./DerivedData/Build/Products/Release-iphoneos/PoushiTongdao.app ./App/

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: PoushiTongdao.app
          path: ./App/PoushiTongdao.app/
          retention-days: 7
